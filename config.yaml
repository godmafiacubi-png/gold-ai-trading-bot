app:
  name: Gold AI Trading Bot
  mode: paper
  log_level: INFO

market:
  symbol: XAUUSDm
  timeframe: M5
  bars: 200000

risk:
  account_balance: 1000
  risk_per_trade_pct: 1.0
  fixed_lot: 0.01
  use_auto_lot: true
  max_open_positions: 1
  max_daily_drawdown_pct: 5.0

strategy:
  min_confidence: 0.65
  allow_buy: false
  allow_sell: true
  atr_period: 14
  swing_lookback: 3
  fvg_min_points: 20
  use_fvg_retest: true
  fvg_retest_lookback: 20
  use_session_filter: true
  allowed_sessions:
    - london
    - new_york
    - overlap
  use_regime_filter: true
  min_atr_pct: 0.0004
  max_atr_pct: 0.004
  use_quality_filter: true
  min_body_atr_ratio: 0.05
  min_rejection_wick_ratio: 0.05
  min_close_strength_sell: 0.50
  min_close_strength_buy: 0.50
  body_avg_period: 20

sessions:
  london: true
  new_york: true
  overlap: true

htf:
  enabled: true
  timeframe: H1
  bars: 20000
  swing_lookback: 3
  premium_discount_lookback: 100

execution:
  dry_run: true
  deviation: 20
  magic: 260512

ml:
  model_path: models/lightgbm_model.pkl
  use_ml_filter: false

hybrid_ai:
  enabled: true
  # Optional trained model paths. If files are missing, the engine falls back to robust rules.
  regime_model_path: models/regime_classifier.pkl
  signal_model_path: models/hybrid_signal_scorer.pkl
  rl_q_table_path: models/rl_execution_q_table.json
  min_signal_score: 0.68
  min_regime_confidence: 0.45
  anomaly_lookback: 100
  anomaly_z_threshold: 3.0
  max_anomaly_score: 3.0
  volatility_ewm_span: 20
  base_sl_atr_mult: 1.5
  base_tp_atr_mult: 3.0
